<!doctype html>
<html lang="zh-CN" data-site-boot-phase="boot" data-site-boot-assets="loading">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#f6f0e8" />
		<link
			rel="preload"
			href="/fonts/FZLanTYJ_Zhong.otf"
			as="font"
			type="font/otf"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="/images/loading/arona_loading_halo_normal.png"
			as="image"
			type="image/png"
		/>
		<link
			rel="preload"
			href="/images/loading/arona_loading_halo_heart.png"
			as="image"
			type="image/png"
		/>
		<link
			rel="preload"
			href="/images/loading/arona_loading_outline.png"
			as="image"
			type="image/png"
		/>
		<script>
			;(() => {
				const root = document.documentElement
				const isManageRoute =
					location.pathname === '/manage' || location.pathname.startsWith('/manage/')
				const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches
				const haloSources = {
					normal: '/images/loading/arona_loading_halo_normal.png',
					heart: '/images/loading/arona_loading_halo_heart.png'
				}
				const assetPaths = [
					haloSources.normal,
					haloSources.heart,
					'/images/loading/arona_loading_outline.png'
				]

				root.dataset.siteBootPhase = isManageRoute ? 'idle' : 'boot'
				root.dataset.siteBootAssets = isManageRoute ? 'ready' : 'loading'

				if (isManageRoute) {
					return
				}

				let currentHalo = 'normal'
				let flipAnimationFrame = null
				let flipStartedAt = null
				let pendingAssets = assetPaths.length
				let resolveAssetsReady = () => {}
				const assetsReady = new Promise((resolve) => {
					resolveAssetsReady = resolve
				})

				const settleAsset = () => {
					pendingAssets -= 1
					if (pendingAssets <= 0) {
						root.dataset.siteBootAssets = 'ready'
						resolveAssetsReady()
					}
				}

				const clearLoadingIconTimeline = () => {
					if (flipAnimationFrame) {
						cancelAnimationFrame(flipAnimationFrame)
						flipAnimationFrame = null
					}

					flipStartedAt = null
				}

				const syncHaloState = (stack) => {
					if (stack instanceof HTMLElement) {
						stack.dataset.siteBootHalo = currentHalo
					}
				}

				const startLoadingIconTimeline = () => {
					const stack = document.getElementById('site-boot-stack')
					if (!(stack instanceof HTMLElement)) {
						return
					}

					const step = (timestamp) => {
						if (root.dataset.siteBootPhase === 'idle') {
							clearLoadingIconTimeline()
							return
						}

						if (flipStartedAt === null) {
							flipStartedAt = timestamp
						}

						const elapsedMs = timestamp - flipStartedAt
						const rotationDeg = (elapsedMs / 1000) * 180
						const nextHalo = Math.floor((elapsedMs + 500) / 1000) % 2 === 0 ? 'normal' : 'heart'

						if (currentHalo !== nextHalo) {
							currentHalo = nextHalo
							syncHaloState(stack)
						}

						stack.style.transform = `rotateY(${rotationDeg}deg)`
						flipAnimationFrame = requestAnimationFrame(step)
					}

					clearLoadingIconTimeline()
					currentHalo = 'normal'
					stack.classList.add('site-boot-overlay__stack--ready')
					syncHaloState(stack)

					if (prefersReducedMotion) {
						stack.style.transform = 'rotateY(0deg)'
						return
					}

					flipAnimationFrame = requestAnimationFrame(step)
				}

				const stopWhenReady = () => {
					if (root.dataset.siteBootPhase === 'idle') {
						clearLoadingIconTimeline()
					}
				}

				const phaseObserver = new MutationObserver(() => {
					stopWhenReady()
				})

				phaseObserver.observe(root, {
					attributes: true,
					attributeFilter: ['data-site-boot-phase']
				})

				window.addEventListener(
					'DOMContentLoaded',
					async () => {
						await assetsReady
						if (root.dataset.siteBootPhase === 'idle') {
							return
						}

						requestAnimationFrame(() => {
							startLoadingIconTimeline()
						})
					},
					{ once: true }
				)

				window.addEventListener(
					'pagehide',
					() => {
						clearLoadingIconTimeline()
						phaseObserver.disconnect()
					},
					{ once: true }
				)

				for (const assetPath of assetPaths) {
					const image = new Image()
					let settled = false
					const done = () => {
						if (settled) {
							return
						}

						settled = true
						settleAsset()
					}

					image.onload = done
					image.onerror = done
					image.src = assetPath

					if (image.complete) {
						done()
					}
				}
			})()
		</script>
		<style>
			html[data-site-boot-phase='boot'],
			html[data-site-boot-phase='entry'],
			html[data-site-boot-phase='boot'] body,
			html[data-site-boot-phase='entry'] body {
				overflow: hidden;
			}

			#site-boot-overlay {
				position: fixed;
				inset: 0;
				z-index: 120;
				display: grid;
				place-items: center;
				overflow: clip;
				contain: paint;
				background:
					radial-gradient(circle at top left, rgba(114, 220, 255, 0.18), transparent 28%),
					radial-gradient(circle at 86% 16%, rgba(79, 120, 255, 0.12), transparent 24%),
					linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 24%),
					linear-gradient(180deg, #f4fbff 0%, #dff0ff 48%, #d6e7f8 100%);
				transition:
					opacity 260ms cubic-bezier(0.2, 0.8, 0.2, 1),
					transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1),
					filter 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			html[data-site-boot-phase='entry'] #site-boot-overlay,
			html[data-site-boot-phase='idle'] #site-boot-overlay {
				opacity: 0;
				transform: scale(1.015);
				filter: blur(10px);
				clip-path: inset(0);
				pointer-events: none;
			}

			html[data-site-boot-phase='idle'] #site-boot-overlay {
				visibility: hidden;
			}

			#site-boot-overlay::before {
				content: '';
				position: absolute;
				inset: 0;
				pointer-events: none;
				background:
					linear-gradient(135deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.06) 34%),
					linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 30%);
			}

			.site-boot-overlay__room,
			.site-boot-overlay__light {
				position: absolute;
				pointer-events: none;
				z-index: 0;
			}

			.site-boot-overlay__room {
				inset: 0;
				background:
					linear-gradient(
						180deg,
						rgba(255, 255, 255, 0.04) 0%,
						rgba(187, 228, 249, 0.08) 46%,
						rgba(123, 197, 236, 0.16) 100%
					),
					repeating-linear-gradient(
						90deg,
						rgba(255, 255, 255, 0.3) 0,
						rgba(255, 255, 255, 0.3) 1px,
						transparent 1px,
						transparent 12%
					),
					repeating-linear-gradient(
						180deg,
						rgba(255, 255, 255, 0.16) 0,
						rgba(255, 255, 255, 0.16) 1px,
						transparent 1px,
						transparent 13%
					);
				opacity: 0.6;
			}

			.site-boot-overlay__light {
				border-radius: 999px;
				filter: blur(14px);
				opacity: 0.75;
			}

			.site-boot-overlay__light--left {
				left: 20%;
				top: 12%;
				width: 26%;
				height: 24%;
				background: radial-gradient(circle, rgba(139, 225, 255, 0.78), transparent 70%);
			}

			.site-boot-overlay__light--right {
				right: 8%;
				top: 18%;
				width: 24%;
				height: 18%;
				background: radial-gradient(circle, rgba(108, 153, 255, 0.3), transparent 72%);
			}

			.site-boot-overlay__body {
				position: relative;
				z-index: 1;
				display: grid;
				place-items: center;
				width: min(100%, 24rem);
				padding: 1.5rem;
				perspective: 1100px;
			}

			.site-boot-overlay__stack {
				position: relative;
				width: clamp(3.6rem, 17vw, 5.2rem);
				height: calc(clamp(3.6rem, 17vw, 5.2rem) * 1.7);
				display: grid;
				place-items: center;
				transform-style: preserve-3d;
				transition:
					opacity 140ms cubic-bezier(0.2, 0.8, 0.2, 1),
					filter 140ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			html[data-site-boot-assets='loading'] .site-boot-overlay__stack {
				opacity: 0;
				filter: blur(10px);
			}

			.site-boot-overlay__halo-stage,
			.site-boot-overlay__outline-stage {
				position: absolute;
				left: 50%;
				transform: translateX(-50%);
				display: grid;
				place-items: center;
			}

			.site-boot-overlay__halo-stage {
				top: 0;
				width: 42%;
				height: 36%;
			}

			.site-boot-overlay__outline-stage {
				bottom: 0;
				width: 100%;
				height: 76%;
			}

			.site-boot-overlay__halo,
			.site-boot-overlay__outline {
				position: absolute;
				inset: 0;
				margin: auto;
				object-fit: contain;
			}

			.site-boot-overlay__halo {
				width: 100%;
				height: auto;
				filter: drop-shadow(0 0 24px rgba(93, 170, 255, 0.34));
				opacity: 0;
				transition: opacity 40ms linear;
			}

			.site-boot-overlay__stack[data-site-boot-halo='normal'] .site-boot-overlay__halo--normal,
			.site-boot-overlay__stack[data-site-boot-halo='heart'] .site-boot-overlay__halo--heart {
				opacity: 1;
			}

			.site-boot-overlay__outline {
				width: 100%;
				height: auto;
				filter: drop-shadow(0 20px 32px rgba(46, 94, 150, 0.18));
			}

			.site-boot-overlay__label {
				margin-top: 1rem;
				display: inline-flex;
				align-items: center;
				gap: 0.03em;
				font-size: clamp(1.32rem, 3.4vw, 1.72rem);
				font-weight: 800;
				letter-spacing: 0.14em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.98);
				text-shadow:
					0 1px 0 rgba(255, 255, 255, 0.82),
					0 -4px 0 rgba(53, 102, 165, 0.92),
					0 4px 0 rgba(53, 102, 165, 0.92),
					-4px 0 0 rgba(53, 102, 165, 0.92),
					4px 0 0 rgba(53, 102, 165, 0.92),
					-3px -3px 0 rgba(53, 102, 165, 0.92),
					3px -3px 0 rgba(53, 102, 165, 0.92),
					-3px 3px 0 rgba(53, 102, 165, 0.92),
					3px 3px 0 rgba(53, 102, 165, 0.92),
					-2px -4px 0 rgba(53, 102, 165, 0.92),
					2px -4px 0 rgba(53, 102, 165, 0.92),
					-2px 4px 0 rgba(53, 102, 165, 0.92),
					2px 4px 0 rgba(53, 102, 165, 0.92),
					-4px -2px 0 rgba(53, 102, 165, 0.92),
					4px -2px 0 rgba(53, 102, 165, 0.92),
					-4px 2px 0 rgba(53, 102, 165, 0.92),
					4px 2px 0 rgba(53, 102, 165, 0.92),
					0 6px 14px rgba(96, 156, 220, 0.18);
				transition:
					opacity 140ms cubic-bezier(0.2, 0.8, 0.2, 1),
					filter 140ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			html[data-site-boot-assets='loading'] .site-boot-overlay__label {
				opacity: 0;
				filter: blur(8px);
			}

			.site-boot-overlay__label-char {
				display: inline-block;
				animation: site-boot-loading-wave 900ms ease-in-out infinite;
			}

			.site-boot-overlay__label-char:nth-child(1) {
				animation-delay: 0ms;
			}

			.site-boot-overlay__label-char:nth-child(2) {
				animation-delay: 60ms;
			}

			.site-boot-overlay__label-char:nth-child(3) {
				animation-delay: 120ms;
			}

			.site-boot-overlay__label-char:nth-child(4) {
				animation-delay: 180ms;
			}

			.site-boot-overlay__label-char:nth-child(5) {
				animation-delay: 240ms;
			}

			.site-boot-overlay__label-char:nth-child(6) {
				animation-delay: 300ms;
			}

			.site-boot-overlay__label-char:nth-child(7) {
				animation-delay: 360ms;
			}

			.site-boot-overlay__label-char:nth-child(8) {
				animation-delay: 420ms;
			}

			.site-boot-overlay__label-char:nth-child(9) {
				animation-delay: 480ms;
			}

			.site-boot-overlay__label-char:nth-child(10) {
				animation-delay: 540ms;
			}

			.site-boot-overlay__sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			@keyframes site-boot-loading-wave {
				0%,
				18%,
				100% {
					transform: translateY(0);
				}

				32% {
					transform: translateY(-0.62rem);
				}

				44% {
					transform: translateY(0.08rem);
				}

				56% {
					transform: translateY(0);
				}
			}

			@media (prefers-reduced-motion: reduce) {
				#site-boot-overlay {
					transition-duration: 120ms;
				}

				.site-boot-overlay__label-char {
					animation: none;
				}
			}
		</style>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div id="site-boot-overlay" role="status" aria-live="polite" aria-label="正在加载站点界面">
			<div class="site-boot-overlay__room" aria-hidden="true"></div>
			<div class="site-boot-overlay__light site-boot-overlay__light--left" aria-hidden="true"></div>
			<div
				class="site-boot-overlay__light site-boot-overlay__light--right"
				aria-hidden="true"
			></div>
			<div class="site-boot-overlay__body">
				<div id="site-boot-stack" class="site-boot-overlay__stack" aria-hidden="true">
					<div class="site-boot-overlay__halo-stage">
						<img
							class="site-boot-overlay__halo site-boot-overlay__halo--normal"
							src="/images/loading/arona_loading_halo_normal.png"
							alt=""
							loading="eager"
							decoding="async"
						/>
						<img
							class="site-boot-overlay__halo site-boot-overlay__halo--heart"
							src="/images/loading/arona_loading_halo_heart.png"
							alt=""
							loading="eager"
							decoding="async"
						/>
					</div>
					<div class="site-boot-overlay__outline-stage">
						<img
							class="site-boot-overlay__outline"
							src="/images/loading/arona_loading_outline.png"
							alt=""
							loading="eager"
							decoding="async"
						/>
					</div>
				</div>
				<div class="site-boot-overlay__label" aria-hidden="true">
					<span class="site-boot-overlay__label-char">L</span>
					<span class="site-boot-overlay__label-char">o</span>
					<span class="site-boot-overlay__label-char">a</span>
					<span class="site-boot-overlay__label-char">d</span>
					<span class="site-boot-overlay__label-char">i</span>
					<span class="site-boot-overlay__label-char">n</span>
					<span class="site-boot-overlay__label-char">g</span>
					<span class="site-boot-overlay__label-char">.</span>
					<span class="site-boot-overlay__label-char">.</span>
					<span class="site-boot-overlay__label-char">.</span>
				</div>
			</div>
			<span class="site-boot-overlay__sr-only">正在加载站点界面</span>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
