name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Cloudflare types
        run: npm run gen

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Validate mdsvex content
        run: npm run validate:mdsvex

      - name: Build
        run: npm run build
